name: Seedo
options:
  bundleIdPrefix: tech.seedo
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15"
  createIntermediateGroups: true
packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "6.0.0"
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.0.0"
targets:
  Seedo:
    type: application
    platform: macOS
    sources:
      - path: SeedoMac
    resources:
      - path: SeedoMac/Resources
    entitlements:
      path: SeedoMac/Seedo.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: tech.seedo.mac
        SWIFT_VERSION: "5.10"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_FILE: SeedoMac/Info.plist
    dependencies:
      - package: GRDB
        product: GRDB
      - package: KeyboardShortcuts
        product: KeyboardShortcuts
      - sdk: EventKit.framework
  SeedoMacTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: SeedoMacTests
    dependencies:
      - target: Seedo
    settings:
      base:
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_VERSION: "5.10"
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
